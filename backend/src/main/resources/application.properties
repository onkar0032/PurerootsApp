# ============================================
# Pure Roots - Application Configuration
# ============================================

# Server
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5433/pureroots?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JSONB support
spring.jpa.properties.hibernate.types.print.banner=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# CORS (allow React dev server)
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.pureroots=DEBUG
logging.level.org.springframework.security=DEBUG
